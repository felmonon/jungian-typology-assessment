<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Teal accent matching site design -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <!-- Dark charcoal matching site text -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer ring - the Self -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1f2937" stroke-width="4"/>

  <!-- Four quadrants representing Jung's four functions -->
  <circle cx="100" cy="50" r="26" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <circle cx="150" cy="100" r="26" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <circle cx="100" cy="150" r="26" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <circle cx="50" cy="100" r="26" fill="none" stroke="#14b8a6" stroke-width="3"/>

  <!-- Center circle - the Ego -->
  <circle cx="100" cy="100" r="20" fill="#14b8a6"/>

  <!-- Cross connecting the functions -->
  <line x1="100" y1="24" x2="100" y2="80" stroke="#1f2937" stroke-width="2.5"/>
  <line x1="100" y1="120" x2="100" y2="176" stroke="#1f2937" stroke-width="2.5"/>
  <line x1="24" y1="100" x2="80" y2="100" stroke="#1f2937" stroke-width="2.5"/>
  <line x1="120" y1="100" x2="176" y2="100" stroke="#1f2937" stroke-width="2.5"/>

  <!-- Cardinal dots -->
  <circle cx="100" cy="24" r="5" fill="#1f2937"/>
  <circle cx="176" cy="100" r="5" fill="#1f2937"/>
  <circle cx="100" cy="176" r="5" fill="#1f2937"/>
  <circle cx="24" cy="100" r="5" fill="#1f2937"/>
</svg>
